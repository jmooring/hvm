on:
  pull_request:
    branches: [main]
  workflow_dispatch:
name: test
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
          cache-dependency-path: |
            **/go.sum
            **/go.mod

      - name: Build check
        run: go build -o /dev/null ./main.go

      - name: Test
        env:
          HVM_GITHUBTOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go test -v -coverprofile coverage.out ./...
